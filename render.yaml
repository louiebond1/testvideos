services:
  - type: web
    name: ex3-testops
    runtime: python
    buildCommand: pip install -r requirements.txt && playwright install chromium --with-deps
    startCommand: uvicorn ui.server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: SF_URL
        sync: false
      - key: SF_USERNAME
        sync: false
      - key: SF_PASSWORD
        sync: false
    disk:
      name: runs
      mountPath: /opt/render/project/src/runs
      sizeGB: 1
